  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Sonder Spinner — 3D Explorations<\u002Ftitle>\n<style>\n  /* latin-ext */\n@font-face {\n  font-family: 'DM Mono';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"c71ae21e-0e22-42f2-903a-c215fcd525ca\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Mono';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"67f295d6-48a5-4377-9123-d044a167c638\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'DM Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"ea7fdb56-086c-4da5-bbd3-ab2fa5e2aeb9\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f369a8d8-3b19-4260-a0c3-f67f8d145b63\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n  :root {\n    --c: #6B6560;\n    --bg: #FFFEFE;\n  }\n\n  body {\n    background: var(--bg);\n    font-family: 'DM Mono', monospace;\n    padding: 48px 32px 80px;\n  }\n\n  h1 {\n    font-size: 10px;\n    font-weight: 400;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--c);\n    opacity: 0.35;\n    margin-bottom: 40px;\n  }\n\n  .grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));\n    gap: 2px;\n  }\n\n  .cell {\n    width: 100%;\n    aspect-ratio: 1;\n    background: var(--bg);\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    position: relative;\n    overflow: hidden;\n  }\n\n  .label {\n    position: absolute;\n    bottom: 14px;\n    left: 0; right: 0;\n    text-align: center;\n    font-size: 9px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--c);\n    opacity: 0.28;\n  }\n\n  /* ── SVG icon sizes ── */\n  .icon {\n    width: 110px;\n    height: 110px;\n    fill: var(--c);\n  }\n\n  /* ── shared path refs ── */\n  .p-outer { fill: var(--c); }\n  .p-inner { fill: var(--c); }\n\n\n  /* ════════════════════════════════════════\n     01 — TUMBLE: continuous end-over-end rotateX\n  ════════════════════════════════════════ */\n  .c01 { perspective: 500px; }\n  .c01 .icon {\n    animation: tumble 2.4s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;\n    transform-style: preserve-3d;\n  }\n  @keyframes tumble {\n    0%   { transform: rotateX(0deg); }\n    100% { transform: rotateX(360deg); }\n  }\n\n  /* ════════════════════════════════════════\n     02 — COIN FLIP Y: eased, pauses face-on\n  ════════════════════════════════════════ */\n  .c02 { perspective: 500px; }\n  .c02 .icon {\n    animation: coin-flip 2.8s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;\n  }\n  @keyframes coin-flip {\n    0%   { transform: rotateY(0deg);   }\n    40%  { transform: rotateY(160deg); }\n    50%  { transform: rotateY(180deg); }\n    90%  { transform: rotateY(340deg); }\n    100% { transform: rotateY(360deg); }\n  }\n\n  /* ════════════════════════════════════════\n     03 — GYROSCOPE: outer rotateY, inner rotateX, independent\n  ════════════════════════════════════════ */\n  .c03 {\n    perspective: 600px;\n    perspective-origin: 50% 50%;\n  }\n  .c03 .stage {\n    width: 110px; height: 110px;\n    position: relative;\n    transform-style: preserve-3d;\n  }\n  .c03 .ring-outer {\n    position: absolute; inset: 0;\n    width: 110px; height: 110px;\n    animation: gyr-outer 3s cubic-bezier(0.45, 0.0, 0.55, 1) infinite;\n    transform-origin: 50% 50%;\n  }\n  .c03 .ring-inner {\n    position: absolute; inset: 0;\n    width: 110px; height: 110px;\n    animation: gyr-inner 2s cubic-bezier(0.45, 0.0, 0.55, 1) infinite;\n    transform-origin: 50% 50%;\n  }\n  @keyframes gyr-outer {\n    0%   { transform: rotateY(0deg); }\n    100% { transform: rotateY(360deg); }\n  }\n  @keyframes gyr-inner {\n    0%   { transform: rotateX(0deg); }\n    100% { transform: rotateX(-360deg); }\n  }\n\n  /* ════════════════════════════════════════\n     04 — ORBIT TILT: diagonal axis spin\n  ════════════════════════════════════════ */\n  .c04 { perspective: 600px; }\n  .c04 .icon {\n    animation: orbit-tilt 2.6s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;\n    transform-origin: 50% 50%;\n  }\n  @keyframes orbit-tilt {\n    0%   { transform: rotate3d(1, 1, 0, 0deg); }\n    100% { transform: rotate3d(1, 1, 0, 360deg); }\n  }\n\n  /* ════════════════════════════════════════\n     05 — WOBBLE SPIN: Y spin with wobbling tilt\n  ════════════════════════════════════════ */\n  .c05 { perspective: 700px; }\n  .c05 .icon {\n    animation: wobble-spin 3s ease-in-out infinite;\n  }\n  @keyframes wobble-spin {\n    0%   { transform: rotateY(0deg) rotateX(0deg); }\n    25%  { transform: rotateY(90deg) rotateX(20deg); }\n    50%  { transform: rotateY(180deg) rotateX(0deg); }\n    75%  { transform: rotateY(270deg) rotateX(-20deg); }\n    100% { transform: rotateY(360deg) rotateX(0deg); }\n  }\n\n  /* ════════════════════════════════════════\n     06 — PENDULUM 3D: swings toward/away on rotateX\n  ════════════════════════════════════════ */\n  .c06 { perspective: 400px; perspective-origin: 50% 20%; }\n  .c06 .icon {\n    animation: pendulum3d 2s cubic-bezier(0.37, 0, 0.63, 1) infinite;\n    transform-origin: 50% 0%;\n  }\n  @keyframes pendulum3d {\n    0%, 100% { transform: rotateX(-55deg); }\n    50%       { transform: rotateX(55deg); }\n  }\n\n  /* ════════════════════════════════════════\n     07 — RISE & FALL: Y spin + vertical translate with depth scale\n  ════════════════════════════════════════ */\n  .c07 { perspective: 600px; }\n  .c07 .icon {\n    animation: rise-fall 2.4s cubic-bezier(0.65, 0, 0.35, 1) infinite;\n  }\n  @keyframes rise-fall {\n    0%   { transform: translateZ(-60px) translateY(20px) rotateY(0deg);   opacity: 0.45; }\n    40%  { transform: translateZ(30px)  translateY(-12px) rotateY(180deg); opacity: 1; }\n    100% { transform: translateZ(-60px) translateY(20px) rotateY(360deg); opacity: 0.45; }\n  }\n\n  /* ════════════════════════════════════════\n     08 — OUTER ORBIT PLANE: outer diamond orbits on tilted plane\n  ════════════════════════════════════════ */\n  .c08-wrap {\n    width: 110px; height: 110px;\n    position: relative;\n    perspective: 600px;\n  }\n  .c08-outer {\n    position: absolute; inset: 0;\n    width: 110px; height: 110px;\n    animation: orbit-plane 3s cubic-bezier(0.4,0,0.2,1) infinite;\n    fill: var(--c);\n  }\n  .c08-inner {\n    position: absolute; inset: 0;\n    width: 110px; height: 110px;\n    fill: var(--c);\n    animation: inner-beat 3s ease-in-out infinite;\n  }\n  @keyframes orbit-plane {\n    0%   { transform: rotateX(70deg) rotateZ(0deg); }\n    100% { transform: rotateX(70deg) rotateZ(360deg); }\n  }\n  @keyframes inner-beat {\n    0%, 100% { opacity: 1; transform: scale(1); }\n    50%      { opacity: 0.3; transform: scale(0.88); }\n  }\n\n  /* ════════════════════════════════════════\n     09 — SPRING SNAP: fast over-rotates, snaps back\n  ═════ eg) rotateY(-180deg); }\n    100% { transform: rotateX(360deg) rotateY(0deg); }\n  }\n\n  /* ════════════════════════════════════════\n     12 — ELASTIC FLIP: flip with elastic overshoot\n  ════════════════════════════════════════ */\n  .c12 { perspective: 500px; }\n  .c12 .icon {\n    animation: elastic-flip 2.6s cubic-bezier(0.34, 1.6, 0.64, 1) infinite;\n  }\n  @keyframes elastic-flip {\n    0%   { transform: rotateY(0deg); }\n    50%  { transform: rotateY(185deg); }\n    100% { transform: rotateY(360deg); }\n  }\n\n  /* ════════════════════════════════════════\n     13 — TECTONIC: outer tilts forward, inner backward, swap\n  ════════════════════════════════════════ */\n  .c13-wrap {\n    width: 110px; height: 110px;\n    position: relative;\n    perspective: 500px;\n  }\n  .c13-outer {\n    position: absolute; inset: 0;\n    width: 110px; height: 110px;\n    fill: var(--c);\n    animation: tec-outer 2.4s cubic-bezier(0.4,0,0.2,1) infinite;\n    transform-origin: 50% 50%;\n  }\n  .c13-inner {\n    position: absolute; inset: 0;\n    width: 110px; height: 110px;\n    fill: var(--c);\n    animation: tec-inner 2.4s cubic-bezier(0.4,0,0.2,1) infinite;\n    transform-origin: 50% 50%;\n  }\n  @keyframes tec-outer {\n    0%, 100% { transform: rotateX(0deg);   opacity: 1; }\n    50%       { transform: rotateX(70deg);  opacity: 0.35; }\n  }\n  @keyframes tec-inner {\n    0%, 100% { transform: rotateX(0deg);   opacity: 1; }\n    50%       { transform: rotateX(-70deg); opacity: 0.35; }\n  }\n\n  /* ════════════════════════════════════════\n     14 — CAROUSEL: spins on Y, scale encodes depth\n  ════════════════════════════════════════ */\n  .c14 { perspective: 350px; }\n  .c14 .icon {\n    animation: carousel 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;\n  }\n  @keyframes carousel {\n    0%   { transform: rotateY(0deg)   scale(1); }\n    25%  { transform: rotateY(90deg)  scale(0.72); }\n    50%  { transform: rotateY(180deg) scale(1); }\n    75%  { transform: rotateY(270deg) scale(0.72); }\n    100% { transform: rotateY(360deg) scale(1); }\n  }\n\n  /* ════════════════════════════════════════\n     15 — DEPTH THROB: pulses in/out on Z with opacity\n  ════════════════════════════════════════ */\n  .c15 { perspective: 300px; }\n  .c15 .icon {\n    animation: depth-throb 2s cubic-bezier(0.4,0,0.2,1) infinite;\n  }\n  @keyframes depth-throb {\n    0%, 100% { transform: translateZ(0px);   opacity: 1; }\n    50%       { transform: translateZ(-80px); opacity: 0.18; }\n  }\n\n  /* ════════════════════════════════════════\n     16 — ROLLING DIAMOND: rolls along X axis like a coin on its edge\n  ════════════════════════════════════════ */\n  .c16 { perspective: 500px; }\n  .c16 .icon {\n    animation: roll 2.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;\n  }\n  @keyframes roll {\n    0%   { transform: rotateX(0deg) rotateZ(0deg); }\n    50%  { transform: rotateX(180deg) rotateZ(5deg); }\n    100% { transform: rotateX(360deg) rotateZ(0deg); }\n  }\n\n  /* ════════════════════════════════════════\n     17 — PLUNGE: dives into screen, re-emerges\n  ════════════════════════════════════════ */\n  .c17 { perspective: 300px; }\n  .c17 .icon {\n    animation: plunge 2.4s cubic-bezier(0.76, 0, 0.24, 1) infinite;\n  }\n  @keyframes plunge {\n    0%   { transform: translateZ(0px) scale(1);    opacity: 1; }\n    42%  { transform: translateZ(-200px) scale(0.1); opacity: 0; }\n    43%  { transform: translateZ(-200px) scale(0.1); opacity: 0; }\n    58%  { transform: translateZ(60px) scale(1.15);  opacity: 1; }\n    70%  { transform: translateZ(-8px) scale(0.97);  opacity: 1; }\n    100% { transform: translateZ(0px) scale(1);    opacity: 1; }\n  }\n\n  /* ════════════════════════════════════════\n     18 — ROCKING CHAIR: gentle back-and-forth tilt on Z + X\n  ════════════════════════════════════════ */\n  .c18 { perspective: 600px; }\n  .c18 .icon {\n    animation: rocker 3s ease-in-out infinite;\n  }\n  @keyframes rocker {\n    0%, 100% { transform: rotateZ(-12deg) rot
