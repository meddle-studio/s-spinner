<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c: #6B6560;
    --bg: #FFFEFE;
  }

  body {
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    padding: 48px 32px 80px;
  }

  h1 {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--c);
    opacity: 0.35;
    margin-bottom: 40px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2px;
  }

  .cell {
    width: 100%;
    aspect-ratio: 1;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .icon {
    width: 110px;
    height: 110px;
    fill: var(--c);
  }

  .label {
    position: absolute;
    bottom: 14px;
    left: 0; right: 0;
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--c);
    opacity: 0.28;
  }

  .c01 { perspective: 500px; }
  .c01 .icon {
    animation: coin-flip 2.8s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
  }
  @keyframes coin-flip {
    0%   { transform: rotateY(0deg);   }
    40%  { transform: rotateY(160deg); }
    50%  { transform: rotateY(180deg); }
    90%  { transform: rotateY(340deg); }
    100% { transform: rotateY(360deg); }
  }

  .c02 { perspective: 600px; }
  .c02 .icon {
    animation: rise-fall 1.2s cubic-bezier(0.65, 0, 0.35, 1) infinite;
  }
  @keyframes rise-fall {
    0%   { transform: translateZ(-60px) translateY(20px) rotateY(0deg);    opacity: 0.45; }
    40%  { transform: translateZ(30px)  translateY(-12px) rotateY(180deg); opacity: 1; }
    100% { transform: translateZ(-60px) translateY(20px) rotateY(360deg);  opacity: 0.45; }
  }

  .c03 { perspective: 500px; }
  .c03 .icon {
    animation: spring-snap 2.2s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
  }
  @keyframes spring-snap {
    0%   { transform: rotateY(0deg)   scale(1); }
    45%  { transform: rotateY(200deg) scale(0.92); }
    60%  { transform: rotateY(175deg) scale(1.04); }
    75%  { transform: rotateY(185deg) scale(0.98); }
    100% { transform: rotateY(360deg) scale(1); }
  }

  .c04-wrap {
    width: 110px; height: 110px;
    position: relative;
    perspective: 400px;
    transform-style: preserve-3d;
  }
  .c04-outer {
    position: absolute; inset: 0;
    width: 110px; height: 110px;
    fill: var(--c);
    animation: parallax-outer 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }
  .c04-inner {
    position: absolute; inset: 0;
    width: 110px; height: 110px;
    fill: var(--c);
    animation: parallax-inner 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }
  @keyframes parallax-outer {
    0%   { transform: translateZ(18px) rotateY(0deg); }
    100% { transform: translateZ(18px) rotateY(360deg); }
  }
  @keyframes parallax-inner {
    0%   { transform: translateZ(-18px) rotateY(0deg); }
    100% { transform: translateZ(-18px) rotateY(-360deg); }
  }

  .c05 { perspective: 300px; }
  .c05 .icon {
    animation: depth-throb 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }
  @keyframes depth-throb {
    0%, 100% { transform: translateZ(0px);   opacity: 1; }
    50%       { transform: translateZ(-80px); opacity: 0.18; }
  }

  .c06 { perspective: 600px; }
  .c06 .icon {
    animation: full-diag 1.5s cubic-bezier(0.87, 0, 0.13, 1) infinite;
  }
  @keyframes full-diag {
    0%   { transform: rotate3d(1, 0.5, 0.3, 0deg)   scale(1); }
    30%  { transform: rotate3d(1, 0.5, 0.3, 130deg) scale(0.85); }
    60%  { transform: rotate3d(1, 0.5, 0.3, 230deg) scale(1.08); }
    100% { transform: rotate3d(1, 0.5, 0.3, 360deg) scale(1); }
  }

</style>
</head>
